# .github/workflows/fetch-alerts.yml
# ═══════════════════════════════════════════════════════════════
# Runs every 1 hour to keep the scam alerts feed updated.
# Executes fetch-alerts.js → rewrites alerts.json →
# commits and pushes the change back to the repo.
# GitHub Pages picks up the new file automatically on next deploy.
# ═══════════════════════════════════════════════════════════════

name: automated alert scam

on:
  schedule:
    - cron: "0 * * * *"     # Every 1 hour
  workflow_dispatch:          # Manual trigger from Actions tab

concurrency:
  group: refresh-scam-alerts
  cancel-in-progress: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: react-ver          # ← FIX: commit lands on the deployed branch

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch latest scam alerts
        id: fetch
        run: node fetch-alerts.js

      - name: Commit & push alerts.json if changed
        id: commit_step
        run: |
          git config user.name  "PROOF Alert Bot"
          git config user.email "alerts-bot@users.noreply.github.com"
          git add public/alerts.json

          if git diff --cached --quiet; then
            echo "No new alerts to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: refresh scam alerts [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger GitHub Pages Deploy
        if: steps.commit_step.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy.yml --ref react-ver
